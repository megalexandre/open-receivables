name: CI

on:
  pull_request:
    branches: [main]

    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Start WireMock
        run: docker compose up -d wiremock

      - name: Wait for WireMock to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/__admin/health && break
            echo "Waiting for WireMock... ($i)"
            sleep 2
          done

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev ninja-build cmake xvfb

      - name: Run integration tests
        run: xvfb-run --auto-servernum flutter test integration_test/ -d linux

      - name: Stop WireMock
        if: always()
        run: docker compose down

      - run: flutter build web --dart-define=API_BASE_URL=http://localhost:8080
