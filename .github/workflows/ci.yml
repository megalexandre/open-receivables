name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - run: flutter build web --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
